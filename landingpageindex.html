<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIBIM | Sistema Integral de Bienes Municipales</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        .hero-section {
            background: linear-gradient(135deg, #1a365d 0%, #2d6bcc 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        
        .municipal-logo {
            width: 150px;
            height: 150px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            color: #1a365d;
            font-size: 4rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .btn-municipal {
            background: linear-gradient(45deg, #2d6bcc, #1a365d);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            margin-top: 30px;
            transition: all 0.3s;
        }
        
        .btn-municipal:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(45, 107, 204, 0.3);
            color: white;
        }
    </style>
</head>
<body>
    <!-- Hero Section -->
    <section class="hero-section">
        <div class="container text-center">
            <div class="municipal-logo">
                <i class="fas fa-landmark"></i>
            </div>
            
            <h1 class="display-4 fw-bold mb-3">SIBIM Tzompantepec</h1>
            <p class="lead mb-4" style="max-width: 700px; margin: 0 auto;">
                Sistema Integral de Bienes Municipales del Gobierno Municipal de Tzompantepec
            </p>
            <p class="mb-5 opacity-75">
                Tecnología de vanguardia para la gestión transparente y eficiente del inventario municipal
            </p>
            
            <a href="login.html" class="btn-municipal">
                <i class="fas fa-door-open me-2"></i>Acceder al Sistema
            </a>
            
            <div class="mt-5">
                <p class="small text-white-50">
                    © 2024 Ayuntamiento de Tzompantepec. Todos los derechos reservados.
                </p>
            </div>
        </div>
    </section>

    <!-- Font Awesome -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
</body>
</html>

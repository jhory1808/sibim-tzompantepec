<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase CRUD Pro - Aplicación Completa</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Firebase SDKs -->
    <script type="module">
        // Importar e inicializar Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-firestore.js";
        
        const firebaseConfig = {
  apiKey: "AIzaSyDbLFKFwjt-BynBKRsQOpUBEENFb-xq3AU",
  authDomain: "sibimtzomp.firebaseapp.com",
  projectId: "sibimtzomp",
  storageBucket: "sibimtzomp.firebasestorage.app",
  messagingSenderId: "1016892953395",
  appId: "1:1016892953395:web:b8795dd577c3ebb1a8a446"
};
        
        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // Conectar a emulador si estamos en localhost
        if (window.location.hostname === 'localhost' || 
            window.location.hostname === '127.0.0.1') {
            import("https://www.gstatic.com/firebasejs/11.2.0/firebase-firestore.js")
                .then(({ connectFirestoreEmulator }) => {
                    connectFirestoreEmulator(db, 'localhost', 8080);
                    console.log("🔥 Conectado al emulador Firestore");
                });
        }
        
        // Hacer disponible globalmente
        window.db = db;
        window.firebaseApp = app;
        
        console.log("✅ Firebase inicializado correctamente");
    </script>
</head>
<body>
    <!-- Loading inicial -->
    <div id="loading" style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: white;
        z-index: 9999;
    ">
        <div style="font-size: 3rem; margin-bottom: 1rem;">🔥</div>
        <h1 style="margin-bottom: 0.5rem;">Firebase CRUD Pro</h1>
        <p>Cargando aplicación...</p>
        <div class="loading" style="margin-top: 2rem; border-color: rgba(255,255,255,0.3); 
             border-top-color: white;"></div>
    </div>
    
    <!-- App se cargará aquí -->
    
    <!-- Scripts -->
    <script type="module" src="auth.js"></script>
    <script type="module" src="app.js"></script>
    
    <script>
        // Ocultar loading cuando la app cargue
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading').style.display = 'none';
                }, 500);
            }, 1000);
        });
    </script>
</body>
</html>
